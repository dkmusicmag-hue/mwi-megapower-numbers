<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MWI — Компания в цифрах</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Root canvas: 1600×913, scaled to fit viewport */
  .root {
    width: 1600px;
    height: 913px;
    position: relative;
    transform-origin: center center;
    flex-shrink: 0;
  }

  /* ── Image Frame ── */
  .image-frame {
    position: absolute;
    top: 80px;
    left: 40px;
    width: 1520px;
    height: 753px;
    overflow: hidden;
  }

  .bg-image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: bottom center;
    opacity: 0;
    will-change: opacity;
  }

  .bg-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.40) 0%,
      rgba(0,0,0,0.00) 50%,
      rgba(0,0,0,0.40) 100%
    );
    opacity: 0;
    will-change: opacity;
  }

  /* Decorative vectors */
  .vec {
    position: absolute;
    pointer-events: none;
  }
  .vec-6 {
    left: 736px; top: 328.5px;
    width: 295.5px; height: 195px;
    opacity: 0;
  }
  .vec-7 {
    left: 825px; top: 532.5px;
    width: 144px; height: 12px;
    opacity: 0;
  }
  .vec-8 {
    left: 791.5px; top: 550.5px;
    width: 255.5px; height: 216.5px;
    opacity: 0;
  }

  /* ── Caption ── */
  .caption {
    position: absolute;
    left: 16px;
    top: 72px;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transform: translateY(14px);
    will-change: opacity, transform;
  }
  .caption-dot {
    width: 6px;
    height: 6px;
    background: #72CFE8;
    flex-shrink: 0;
  }
  .caption-text {
    font-family: 'Open Sans', sans-serif;
    font-weight: 400;
    font-size: 16px;
    color: #fff;
    letter-spacing: -0.16px;
    line-height: 1.25;
    white-space: nowrap;
  }

  /* ── Title ── */
  .title {
    position: absolute;
    left: 384px;
    top: 87px;
    transform: translateY(-50%) translateX(-20px);
    font-family: 'Open Sans', sans-serif;
    font-weight: 300;
    font-size: 56px;
    color: #fff;
    letter-spacing: 0.56px;
    line-height: 1.1;
    white-space: nowrap;
    opacity: 0;
    will-change: opacity, transform;
  }

  /* ── Numbers grid ── */
  .numbers-grid {
    position: absolute;
    right: 0;
    top: 350px;
    width: 1136px;
    display: flex;
    flex-wrap: wrap;
    gap: 40px 16px;
    align-content: flex-start;
    align-items: flex-start;
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 368px;
  }

  .stat-number {
    font-family: 'Open Sans', sans-serif;
    font-weight: 300;
    font-size: 96px;
    color: #fff;
    letter-spacing: -1.92px;
    line-height: 1.05;
    opacity: 0;
    transform: translateY(28px);
    will-change: opacity, transform;
  }

  .stat-divider {
    height: 1px;
    background: rgba(255,255,255,0.35);
    width: 100%;
    opacity: 0;
    transform: scaleX(0);
    transform-origin: left center;
    will-change: opacity, transform;
  }

  .stat-label {
    font-family: 'Open Sans', sans-serif;
    font-weight: 400;
    font-size: 16px;
    color: #fff;
    letter-spacing: -0.16px;
    line-height: 1.25;
    opacity: 0;
    transform: translateY(10px);
    will-change: opacity, transform;
  }

  /* Replay button */
  .replay-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: rgba(114,207,232,0.15);
    border: 1px solid #72CFE8;
    color: #72CFE8;
    font-family: 'Open Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 0.5px;
    padding: 8px 20px;
    cursor: pointer;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.4s ease, background 0.2s ease;
  }
  .replay-btn:hover { background: rgba(114,207,232,0.3); }
  .replay-btn.visible { opacity: 1; }
</style>

    <!-- Numbers grid -->

      <div class="stat-item">

      <div class="stat-item">

      <div class="stat-item">

      </div>

      <div class="stat-item">

</div>

<button class="replay-btn" id="replayBtn" onclick="runAnimation()">↺ Повторить</button>

<script>
  /* ── Scale root to fit viewport ── */
  function scaleRoot() {
    const root = document.getElementById('root');
    const sx = window.innerWidth  / 1600;
    const sy = window.innerHeight / 913;
    root.style.transform = `scale(${Math.min(sx, sy)})`;
  }
  scaleRoot();
  window.addEventListener('resize', scaleRoot);

  /* ── Easing ── */
  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
  function easeOutQuart(t) { return 1 - Math.pow(1 - t, 4); }

  /* ── Transition helper ── */
  function transition(el, props, duration, delay, easing = 'ease') {
    return new Promise(resolve => {
      setTimeout(() => {
        el.style.transition = Object.keys(props)
          .map(k => `${k} ${duration}ms ${easing}`)
          .join(', ');
        requestAnimationFrame(() => {
          Object.entries(props).forEach(([k, v]) => el.style[k] = v);
        });
        setTimeout(resolve, duration + delay);
      }, delay);
    });
  }

  /* ── Format number ── */
  function fmt(n, format, suffix) {
    let s = Math.round(n).toString();
    if (format === 'spaced') s = s.replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
    return s + (suffix || '');
  }

  /* ── Count-up ── */
  function countUp(el, target, format, suffix, duration, startDelay) {
    return new Promise(resolve => {
      setTimeout(() => {
        const t0 = performance.now();
        function tick(now) {
          const p = Math.min((now - t0) / duration, 1);
          el.textContent = fmt(easeOutQuart(p) * target, format, suffix);
          if (p < 1) requestAnimationFrame(tick);
          else { el.textContent = fmt(target, format, suffix); resolve(); }
        }
        requestAnimationFrame(tick);
      }, startDelay);
    });
  }

  /* ── Reset all elements ── */
  function reset() {
    // Remove all inline transitions and restore initial state
    document.querySelectorAll('[style]').forEach(el => {
      el.style.transition = 'none';
    });

    const bg = document.getElementById('bgImage');
    bg.style.opacity = '0';

    document.getElementById('bgOverlay').style.opacity = '0';

    ['vec6','vec7','vec8'].forEach(id => {
      document.getElementById(id).style.opacity = '0';
    });

    const caption = document.getElementById('caption');
    caption.style.opacity = '0';
    caption.style.transform = 'translateY(14px)';

    const title = document.getElementById('title');
    title.style.opacity = '0';
    title.style.transform = 'translateY(-50%) translateX(-20px)';

    document.querySelectorAll('.stat-number').forEach(el => {
      el.style.opacity = '0';
      el.style.transform = 'translateY(28px)';
      el.textContent = '0';
    });
    document.querySelectorAll('.stat-divider').forEach(el => {
      el.style.opacity = '0';
      el.style.transform = 'scaleX(0)';
    });
    document.querySelectorAll('.stat-label').forEach(el => {
      el.style.opacity = '0';
      el.style.transform = 'translateY(10px)';
    });

    document.getElementById('replayBtn').classList.remove('visible');
  }

  /* ── Main animation ── */
  function runAnimation() {
    reset();

    // Short pause so reset renders
    requestAnimationFrame(() => requestAnimationFrame(async () => {

      const T = 'cubic-bezier(0.22, 1, 0.36, 1)';

      /* 1. Image fades in */
      const bg = document.getElementById('bgImage');
      bg.style.transition = `opacity 1000ms ease`;
      setTimeout(() => bg.style.opacity = '1', 50);

      /* 1b. Overlay + vectors */
      const overlay = document.getElementById('bgOverlay');
      overlay.style.transition = 'opacity 1200ms ease';
      setTimeout(() => overlay.style.opacity = '1', 100);

      ['vec6','vec7','vec8'].forEach((id, i) => {
        const el = document.getElementById(id);
        el.style.transition = `opacity 800ms ease`;
        setTimeout(() => el.style.opacity = '1', 400 + i * 80);
      });

      /* 2. Caption fades in + slides up */
      const caption = document.getElementById('caption');
      setTimeout(() => {
        caption.style.transition = `opacity 600ms ${T}, transform 600ms ${T}`;
        caption.style.opacity = '1';
        caption.style.transform = 'translateY(0)';
      }, 350);

      /* 3. Title slides in from left + fades */
      const titleEl = document.getElementById('title');
      setTimeout(() => {
        titleEl.style.transition = `opacity 700ms ${T}, transform 700ms ${T}`;
        titleEl.style.opacity = '1';
        titleEl.style.transform = 'translateY(-50%) translateX(0)';
      }, 650);

      /* 4. Stats – staggered left → right, row by row */
      const items = document.querySelectorAll('.stat-item');
      const BASE = 1000;
      const STEP = 220; // ms between items (left→right)

      items.forEach((item, i) => {
        const numEl   = item.querySelector('.stat-number');
        const divEl   = item.querySelector('.stat-divider');
        const lblEl   = item.querySelector('.stat-label');

        const target  = parseInt(numEl.dataset.target);
        const format  = numEl.dataset.format || '';
        const suffix  = numEl.dataset.suffix  || '';
        const start   = BASE + i * STEP;

        /* Number: fade + slide up, then count */
        setTimeout(() => {
          numEl.style.transition = `opacity 500ms ${T}, transform 500ms ${T}`;
          numEl.style.opacity = '1';
          numEl.style.transform = 'translateY(0)';
          // Count starts slightly after appearance
          countUp(numEl, target, format, suffix, 1100, 120);
        }, start);

        /* Divider: scale from left */
        setTimeout(() => {
          divEl.style.transition = `opacity 300ms ease, transform 500ms ${T}`;
          divEl.style.opacity = '1';
          divEl.style.transform = 'scaleX(1)';
        }, start + 200);

        /* Label: fade + slide up */
        setTimeout(() => {
          lblEl.style.transition = `opacity 500ms ${T}, transform 500ms ${T}`;
          lblEl.style.opacity = '1';
          lblEl.style.transform = 'translateY(0)';
        }, start + 320);
      });

      /* Show replay button after everything finishes */
      const total = BASE + (items.length - 1) * STEP + 1100 + 500;
      setTimeout(() => {
        document.getElementById('replayBtn').classList.add('visible');
      }, total);

    }));
  }

  /* ── Start when image is ready ── */
  const bgImg = document.getElementById('bgImage');
  function startWhenReady() {
    setTimeout(runAnimation, 200);
  }
  if (bgImg.complete && bgImg.naturalWidth > 0) {
    startWhenReady();
  } else {
    bgImg.addEventListener('load', startWhenReady);
    bgImg.addEventListener('error', startWhenReady); // still animate even if image fails
  }
</script>
